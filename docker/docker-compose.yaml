services:
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: web
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - relay_network

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: api
    restart: unless-stopped
    ports:
      - '3002:3002'
    depends_on:
      - postgres
    networks:
      - relay_network

