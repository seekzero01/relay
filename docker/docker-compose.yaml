services:
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: web
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - relay_network

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: api
    restart: unless-stopped
    ports:
      - '3002:3002'
    depends_on:
      - postgres
    networks:
      - relay_network

#  ai:
#    build:
#      context: .
#      dockerfile: apps/ai-service/Dockerfile
#    container_name: ai
#    ports:
#      - '8000:8000'
#    restart: always
#    depends_on:
#      - postgres
#    networks:
#      - relay_network

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB_FILE: /run/secrets/db_name
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_INITDB_ARGS: "--locale=C.UTF-8"
      LANG: C.UTF-8
    ports:
      - '5432:5432'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $(cat /run/secrets/db_user) -d $(cat /run/secrets/db_name)" ]
      interval: 5s
      timeout: 2s
      retries: 20
    secrets:
      - db_name
      - db_user
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: postgres -c listen_addresses='*'
    networks:
      - relay_network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:

networks:
  relay_network:
    driver: bridge

secrets:
  db_name:
    file: ../.secrets/db_name.txt
  db_user:
    file: ../.secrets/db_user.txt
  db_password:
    file: ../.secrets/db_password.txt