  postgres:
    image: postgres:18.4
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: 5377249ed6a9a6149761542f03947de6444a4aab001973124adcba5b628dcfee
      POSTGRES_PASSWORD: sk_gjaLdpQbFWk-JPXmWeRuL
    ports:
      - '5432:5432'
    volumes:
      - postgres:/var/lib/postgresql/data
    networks:
      - relay_network

volumes:
  postgres:
    name: relay-db

networks:
  relay_network:
    driver: bridge